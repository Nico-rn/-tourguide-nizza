<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jörg Daiber – Guide Conférencier | Nizza & Côte d'Azur</title>
<meta name="description" content="Jörg Daiber – lizenzierter Guide Conférencier in Nizza. Führungen an der Côte d'Azur und in der Provence auf Deutsch, Englisch und Französisch.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azur: #0077be;          /* Azurblau des Mittelmeers */
    --azur-light: #4fb3e8;
    --azur-deep: #023e63;     /* tiefes Meerblau */
    --sun: #f4b942;           /* Sonnengelb */
    --coral: #e8604c;         /* Fassaden der Altstadt */
    --white: #ffffff;
    --cream: #fdf9f0;
    --ink: #1d2d3a;
    --avail: #3bb273;         /* Verfügbar (grün) */
    --busy: #d9dde1;          /* Nicht verfügbar (grau) */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; color: var(--ink); background: var(--cream); line-height: 1.7; }
  .hand { font-family: 'Caveat', cursive; }

  /* ---------- Header ---------- */
  header {
    position: fixed; inset: 0 0 auto 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.7rem 5vw;
    background: rgba(2, 62, 99, 0.55);
    backdrop-filter: blur(10px);
    transition: background .3s;
  }
  header.solid { background: rgba(2, 62, 99, 0.92); }
  .logo { font-family: 'Caveat', cursive; font-size: 1.9rem; font-weight: 700; color: var(--white); text-decoration: none; }
  .logo span { color: var(--sun); }
  nav { display: flex; gap: 1.6rem; align-items: center; }
  nav a { text-decoration: none; color: var(--white); font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: .9; transition: opacity .2s; }
  nav a:hover { opacity: 1; color: var(--sun); }
  .lang-switch { display: flex; gap: 0.35rem; margin-left: 0.8rem; }
  .lang-switch button {
    border: 1px solid rgba(255,255,255,0.6); background: transparent; color: var(--white);
    font-family: 'Jost', sans-serif; font-size: 0.78rem; padding: 0.22rem 0.55rem;
    cursor: pointer; border-radius: 3px; transition: all .2s;
  }
  .lang-switch button.active, .lang-switch button:hover { background: var(--sun); border-color: var(--sun); color: var(--azur-deep); }
  .nav-toggle { display: none; background: none; border: none; font-size: 1.7rem; color: var(--white); cursor: pointer; }

  /* ---------- Hero ---------- */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 7rem 6vw 5rem; color: var(--white); position: relative;
    background:
      linear-gradient(rgba(2, 62, 99, 0.35), rgba(2, 62, 99, 0.55)),
      var(--azur-deep) url('https://images.unsplash.com/photo-1491166617655-0723a0999cfc?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;
  }
  .hero .hand-intro { font-family: 'Caveat', cursive; font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--sun); transform: rotate(-2deg); }
  .hero h1 { font-size: clamp(2.6rem, 7vw, 5rem); font-weight: 600; letter-spacing: 0.02em; margin: 0.4rem 0 1rem; text-shadow: 0 2px 18px rgba(0,0,0,0.35); }
  .hero p.subtitle { font-weight: 300; font-size: clamp(1.05rem, 2.2vw, 1.35rem); letter-spacing: 0.06em; max-width: 620px; }
  .hero .btn {
    margin-top: 2.4rem; background: var(--sun); color: var(--azur-deep);
    padding: 0.95rem 2.6rem; text-decoration: none; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.9rem;
    border-radius: 40px; transition: transform .2s, box-shadow .2s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .hero .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
  .hero .scroll-hint { position: absolute; bottom: 2rem; font-size: 1.6rem; opacity: .8; animation: bob 2s infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }

  /* ---------- Intro / Über mich ---------- */
  .intro { padding: 5rem 8vw 4.5rem; }
  .about-grid {
    display: grid; grid-template-columns: 300px 1fr; gap: 3.5rem;
    align-items: center; max-width: 1000px; margin: 0 auto;
  }
  .polaroid {
    background: var(--white); padding: 14px 14px 18px;
    box-shadow: 0 14px 36px rgba(2, 62, 99, 0.22);
    transform: rotate(-3deg); border-radius: 4px;
    transition: transform .25s;
  }
  .polaroid:hover { transform: rotate(-1deg) scale(1.02); }
  .polaroid img { width: 100%; aspect-ratio: 1/1.05; object-fit: cover; object-position: 35% 30%; display: block; border-radius: 2px; }
  .polaroid figcaption { text-align: center; font-size: 1.6rem; color: var(--azur-deep); margin-top: 0.5rem; }
  .about-text .hand-title { font-size: clamp(2.2rem, 5vw, 3rem); color: var(--azur); font-weight: 700; transform: rotate(-1.5deg); display: inline-block; }
  .about-text p { margin-top: 1rem; font-weight: 300; font-size: 1.08rem; }
  .badges { display: flex; flex-wrap: wrap; gap: 0.7rem; margin-top: 1.6rem; }
  .badge {
    background: var(--white); border: 1.5px solid var(--azur-light); color: var(--azur-deep);
    padding: 0.35rem 1.1rem; border-radius: 30px; font-size: 0.88rem;
  }
  /* Ohne Foto: Text zentrieren */
  .about-text.no-photo { grid-column: 1 / -1; text-align: center; }
  .about-text.no-photo .badges { justify-content: center; }

  /* ---------- Big image panels ---------- */
  .panel {
    min-height: 58vh; display: flex; align-items: flex-end;
    background-color: var(--azur-deep); background-size: cover; background-position: center;
    background-attachment: fixed; position: relative;
  }
  @media (hover: none) { .panel { background-attachment: scroll; } }
  .panel::after { content:""; position: absolute; inset: 0; background: linear-gradient(to top, rgba(2,62,99,0.75) 0%, rgba(2,62,99,0) 55%); }
  .panel-blue { background: linear-gradient(160deg, var(--azur-deep) 0%, var(--azur) 100%); min-height: 38vh; }
  .panel-blue::after { display: none; }
  .panel-content { position: relative; z-index: 2; color: var(--white); padding: 3rem 8vw 3.5rem; max-width: 720px; }
  .panel-content .hand-label { font-family: 'Caveat', cursive; font-size: 2.2rem; color: var(--sun); transform: rotate(-2deg); display: inline-block; }
  .panel-content h2 { font-size: clamp(1.8rem, 4vw, 2.7rem); font-weight: 600; margin: 0.2rem 0 0.6rem; }
  .panel-content p { font-weight: 300; max-width: 560px; }

  /* ---------- Facts band ---------- */
  .facts { background: var(--azur); color: var(--white); padding: 4rem 8vw; }
  .facts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 2.5rem; max-width: 1050px; margin: 0 auto; text-align: center; }
  .fact .hand-num { font-family: 'Caveat', cursive; font-size: 3rem; font-weight: 700; color: var(--sun); line-height: 1.1; }
  .fact p { font-weight: 300; font-size: 0.98rem; }

  /* ---------- Reviews ---------- */
  #reviews { background: var(--white); padding: 5.5rem 8vw; }
  #reviews .hand-title { font-family: 'Caveat', cursive; font-size: clamp(2.4rem, 5vw, 3.4rem); color: var(--azur); font-weight: 700; transform: rotate(-1.5deg); display: inline-block; }
  #reviews .head { text-align: center; }
  #reviews .sub { font-weight: 300; max-width: 560px; margin: 0.6rem auto 2.6rem; text-align: center; }
  .review-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 1.6rem; max-width: 1050px; margin: 0 auto 3rem; }
  .review {
    background: var(--cream); border-radius: 14px; padding: 1.7rem;
    box-shadow: 0 6px 20px rgba(2, 62, 99, 0.08);
  }
  .review .stars { color: var(--sun); font-size: 1.15rem; letter-spacing: 2px; }
  .review p.text { font-weight: 300; font-style: italic; margin: 0.6rem 0 0.8rem; }
  .review .who { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--azur-deep); }
  .review-form {
    max-width: 430px; margin: 0 auto; background: var(--cream);
    border-radius: 16px; padding: 1.5rem 1.7rem 1.7rem; box-shadow: 0 8px 26px rgba(2, 62, 99, 0.1);
  }
  .review-form h3 { font-family: 'Caveat', cursive; font-size: 1.8rem; color: var(--coral); margin-bottom: 0.5rem; text-align: center; transform: rotate(-1deg); }
  .review-form label { display: block; font-size: 0.85rem; font-weight: 500; margin: 0.6rem 0 0.2rem; text-align: left; }
  .review-form input[type="text"], .review-form textarea {
    width: 100%; padding: 0.55rem 0.8rem; border: 1.5px solid #d8e4ec; border-radius: 8px;
    font-family: 'Jost', sans-serif; font-size: 0.92rem; background: var(--white);
  }
  .review-form textarea { min-height: 80px; resize: vertical; }
  .star-picker { display: flex; gap: 0.3rem; font-size: 1.6rem; cursor: pointer; user-select: none; }
  .star-picker span { color: #cfd8de; transition: color .15s, transform .15s; }
  .star-picker span.on { color: var(--sun); }
  .star-picker span:hover { transform: scale(1.15); }
  .review-form button {
    margin-top: 1rem; width: 100%; background: var(--azur); color: var(--white);
    border: none; padding: 0.7rem; border-radius: 40px; font-family: 'Jost', sans-serif;
    font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: background .2s;
  }
  .review-form button:hover { background: var(--azur-deep); }
  .form-note { font-size: 0.82rem; font-weight: 300; margin-top: 0.8rem; text-align: center; opacity: 0.75; }
  .thanks { display: none; text-align: center; font-family: 'Caveat', cursive; font-size: 1.7rem; color: var(--azur); margin-top: 1rem; }

  /* ---------- Contact ---------- */
  #contact { padding: 5.5rem 8vw; text-align: center; }
  #contact .hand-title { font-family: 'Caveat', cursive; font-size: clamp(2.4rem, 5vw, 3.4rem); color: var(--coral); font-weight: 700; transform: rotate(-1.5deg); display: inline-block; }
  #contact .sub { font-weight: 300; max-width: 560px; margin: 0.8rem auto 2.8rem; }
  /* Flexbox statt Grid: unvollständige Reihen werden automatisch zentriert */
  .contact-cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.6rem; max-width: 980px; margin: 0 auto; }
  .ccard {
    flex: 1 1 210px; max-width: 250px;
    background: var(--white); border-radius: 14px; padding: 2.2rem 1.6rem;
    box-shadow: 0 8px 26px rgba(2, 62, 99, 0.1);
    transition: transform .2s;
  }
  .ccard:hover { transform: translateY(-5px); }
  .ccard .icon { font-size: 2.1rem; }
  .ccard h3 { font-family: 'Caveat', cursive; font-size: 1.7rem; color: var(--azur-deep); margin: 0.5rem 0 0.3rem; }
  .ccard a { color: var(--azur); text-decoration: none; font-weight: 500; word-break: break-word; }
  .ccard a:hover { text-decoration: underline; }
  .ccard p { font-weight: 300; font-size: 0.95rem; }

  footer { background: var(--azur-deep); color: rgba(255,255,255,0.75); text-align: center; padding: 1.8rem 5vw; font-size: 0.85rem; font-weight: 300; }
  footer a { color: var(--sun); text-decoration: none; }

  /* ---------- Verfügbarkeit / Kalender ---------- */
  #availability { background: var(--cream); padding: 5.5rem 8vw; }
  #availability .head { text-align: center; }
  #availability .hand-title { font-family: 'Caveat', cursive; font-size: clamp(2.4rem, 5vw, 3.4rem); color: var(--azur); font-weight: 700; transform: rotate(-1.5deg); display: inline-block; }
  #availability .sub { font-weight: 300; max-width: 560px; margin: 0.6rem auto 2.2rem; text-align: center; }
  .cal-card { max-width: 640px; margin: 0 auto; background: var(--white); border-radius: 18px; padding: 1.4rem 1.6rem 1.8rem; box-shadow: 0 10px 30px rgba(2, 62, 99, 0.12); }
  .cal-top { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; margin-bottom: 0.3rem; }
  .cal-top h3 { font-size: 1.35rem; font-weight: 500; color: var(--azur-deep); text-transform: capitalize; min-width: 9rem; text-align: center; }
  .cal-nav { background: var(--azur); color: var(--white); border: none; width: 2.3rem; height: 2.3rem; border-radius: 50%; font-size: 1.1rem; cursor: pointer; transition: background .2s, transform .15s; line-height: 1; }
  .cal-nav:hover:not(:disabled) { background: var(--azur-deep); transform: scale(1.08); }
  .cal-nav:disabled { opacity: 0.35; cursor: default; }
  .cal-updated { text-align: center; font-size: 0.78rem; font-weight: 300; opacity: 0.7; margin-bottom: 1rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-wd { text-align: center; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; color: var(--azur); text-transform: uppercase; padding-bottom: 0.3rem; }
  .cal-day { aspect-ratio: 1 / 1; background: var(--cream); border-radius: 9px; padding: 0.25rem 0.2rem; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
  .cal-day.empty { background: transparent; }
  .cal-day .num { font-size: 0.82rem; font-weight: 500; color: var(--ink); line-height: 1.4; }
  .cal-day.today { outline: 2px solid var(--sun); }
  .cal-slots { display: flex; gap: 3px; margin-top: auto; padding-bottom: 0.15rem; }
  .cal-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--busy); }
  .cal-dot.free { background: var(--avail); }
  .cal-dot.unknown { background: #e7ebef; }
  .cal-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.1rem; margin-top: 1.3rem; font-size: 0.82rem; font-weight: 300; }
  .cal-legend span { display: inline-flex; align-items: center; gap: 0.4rem; }
  .cal-legend i { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .cal-note { text-align: center; font-size: 0.78rem; font-weight: 300; opacity: 0.7; margin-top: 0.8rem; }
  .cal-note a { color: var(--azur); }
  .cal-msg { text-align: center; font-weight: 300; padding: 1.5rem 0; }
  .cal-msg a { color: var(--azur); }

  /* ---------- Responsive ---------- */
  @media (max-width: 780px) {
    nav { position: fixed; top: 58px; right: 0; left: 0; flex-direction: column; align-items: center;
      background: rgba(2,62,99,0.97); padding: 1.6rem 0; gap: 1.2rem;
      transform: translateY(-140%); transition: transform .3s; }
    nav.open { transform: translateY(0); }
    .nav-toggle { display: block; }
    .lang-switch { margin-left: 0; }
    .panel { min-height: 48vh; }
    .about-grid { grid-template-columns: 1fr; gap: 2.5rem; text-align: center; }
    .polaroid { max-width: 260px; margin: 0 auto; }
    .badges { justify-content: center; }
  }
</style>
</head>

<script>
const i18n = {
  de: {
    nav_about: "Über mich", nav_regions: "Regionen", nav_avail: "Verfügbarkeit", nav_reviews: "Bewertungen", nav_contact: "Kontakt",
    avail_hand: "Wann bin ich frei?",
    avail_sub: "Hier sehen Sie meine aktuelle Verfügbarkeit – direkt aus dem offiziellen Planning der Fédération, wöchentlich aktualisiert.",
    avail_loading: "Kalender wird geladen …",

// Seitentitel pro Sprache (für geteilte Links & beim Umschalten).
// Muss zu den Titeln in server.js (SEO) passen.
const PAGE_TITLES = {
  de: "Jörg Daiber – Deutschsprachiger Reiseleiter & Guide an der Côte d'Azur | Nizza, Provence",
  en: "Jörg Daiber – English-Speaking Tour Guide on the French Riviera (Côte d'Azur), Nice & Provence",
  fr: "Jörg Daiber – Guide Conférencier à Nice | Côte d'Azur, Provence & toute la France",
};

function setLang(lang, updateUrl = true) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  if (PAGE_TITLES[lang]) document.title = PAGE_TITLES[lang];
  // URL auf /de, /en bzw. /fr setzen, ohne die Seite neu zu laden.
  // So ist jede Sprache verlinkbar und beim Neuladen liefert der Server
  // die passenden Suchmaschinen-Daten.
  if (updateUrl && window.history && history.pushState) {
    history.pushState({ lang }, '', '/' + lang + location.hash);
  }
  if (typeof renderReviews === 'function') renderReviews();
  if (typeof renderCalendar === 'function') renderCalendar();
}
function t(key) { return (i18n[currentLang] && i18n[currentLang][key]) || i18n.de[key] || ''; }

document.querySelectorAll('nav a').forEach(a =>
  a.addEventListener('click', () => document.querySelector('nav').classList.remove('open')));
window.addEventListener('scroll', () =>
  document.getElementById('header').classList.toggle('solid', window.scrollY > 80));

/* ---------- Bewertungen ---------- */
const seedReviews = [
  { stars: 5, text: { de: "Jörg kennt jede Ecke der Côte d'Azur und erzählt mit so viel Begeisterung – das Highlight unserer Reise!", en: "Jörg knows every corner of the Riviera and shares it with such enthusiasm – the highlight of our trip!", fr: "Jörg connaît chaque recoin de la Côte d'Azur et partage tout avec passion – le point fort de notre voyage !" }, who: "Familie M., Stuttgart" },
  { stars: 5, text: { de: "Perfekt organisiert, herzlich und flexibel. Die Tagestour nach Monaco war unvergesslich.", en: "Perfectly organised, warm and flexible. The day trip to Monaco was unforgettable.", fr: "Organisation parfaite, chaleureux et flexible. L'excursion à Monaco était inoubliable." }, who: "Claudia & Peter, Wien" }
];
let currentLang = 'de';
let pickedStars = 5;
let apiReviews = []; // vom Server geladene, freigegebene Bewertungen

async function loadReviews() {
  try {
    const res = await fetch('/api/reviews');
    if (res.ok) apiReviews = await res.json();
  } catch {
    apiReviews = []; // Server nicht erreichbar -> nur Seed-Bewertungen zeigen
  }
  renderReviews();
}

function renderReviews() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  seedReviews.forEach(r => list.appendChild(reviewCard(r.stars, r.text[currentLang] || r.text.de, r.who)));
  apiReviews.forEach(r => list.appendChild(reviewCard(r.rating, r.text, r.name)));
}
function reviewCard(stars, text, who) {
  const d = document.createElement('div');
  d.className = 'review';
  const s = document.createElement('div'); s.className = 'stars';
  s.textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);
  const p = document.createElement('p'); p.className = 'text'; p.textContent = '„' + text + '"';
  const w = document.createElement('div'); w.className = 'who'; w.textContent = '— ' + who;
  d.append(s, p, w);
  return d;
}
function paintStars() {
  document.querySelectorAll('#starPicker span').forEach(sp =>
    sp.classList.toggle('on', +sp.dataset.v <= pickedStars));
}
document.querySelectorAll('#starPicker span').forEach(sp =>
  sp.addEventListener('click', () => { pickedStars = +sp.dataset.v; paintStars(); }));
paintStars();

document.getElementById('reviewForm').addEventListener('submit', async e => {
  e.preventDefault();
  const name = document.getElementById('revName').value.trim();
  const text = document.getElementById('revText').value.trim();
  if (!name || !text) return;
  try {
    const res = await fetch('/api/reviews', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, rating: pickedStars, text }),
    });
    if (!res.ok) throw new Error();
    // Bewertung ist jetzt "pending" -> erscheint erst nach Freigabe per Mail
    document.getElementById('thanksMsg').style.display = 'block';
    e.target.reset(); pickedStars = 5; paintStars();
  } catch {
    const errMsg = { de: 'Senden fehlgeschlagen – bitte später erneut versuchen.',
                     en: 'Sending failed – please try again later.',
                     fr: "Échec de l'envoi – veuillez réessayer plus tard." };
    alert(errMsg[currentLang] || errMsg.de);
  }
});

/* ---------- Verfügbarkeitskalender ---------- */
const calWeekdays = {
  de: ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'],
  en: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
  fr: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
};
const calMonths = {
  de: ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'],
  en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
  fr: ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'],
};
let calData = null;     // zuletzt geladene Monatsdaten
let calTried = false;   // wurde schon ein Ladeversuch gemacht?

async function loadCalendar(page) {
  calTried = true;
  try {
    const url = page ? '/api/calendar?page=' + encodeURIComponent(page) : '/api/calendar';
    const res = await fetch(url);
    calData = res.ok ? await res.json() : null;
  } catch {
    calData = null; // Server nicht erreichbar
  }
  renderCalendar();
}

function renderCalendar() {
  const card = document.getElementById('calCard');
  if (!card) return;
  if (!calTried) return; // noch nichts geladen -> Lade-Hinweis stehen lassen

  if (!calData || calData.ok === false || !calData.days || calData.days.length === 0) {
    const src = (calData && calData.source) || 'https://www.guides-provence-cotedazur.com/www/guide-180.htm';
    card.innerHTML =
      '<div class="cal-msg">' + t('avail_error') +
      '<br><a href="' + src + '" target="_blank" rel="noopener">' + t('avail_viewsource') + '</a></div>';
    return;
  }

  const d = calData;
  const monthName = calMonths[currentLang][(d.month || 1) - 1];
  const wds = calWeekdays[currentLang];

  const byDay = {};
  d.days.forEach(day => { byDay[day.day] = day; });
  const daysInMonth = new Date(d.year, d.month, 0).getDate();
  const firstJs = new Date(d.year, d.month - 1, 1).getDay(); // 0=So..6=Sa
  const firstOffset = (firstJs + 6) % 7;                     // Montag-first

  const today = new Date();
  const isThisMonth = today.getFullYear() === d.year && (today.getMonth() + 1) === d.month;

  let html = '<div class="cal-top">';
  html += '<button class="cal-nav" id="calPrev"' + (d.prevPage ? '' : ' disabled') + ' aria-label="prev">‹</button>';
  html += '<h3>' + monthName + ' ' + d.year + '</h3>';
  html += '<button class="cal-nav" id="calNext"' + (d.nextPage ? '' : ' disabled') + ' aria-label="next">›</button>';
  html += '</div>';
  if (d.lastUpdate) html += '<div class="cal-updated">' + t('avail_updated') + ' ' + d.lastUpdate + '</div>';

  html += '<div class="cal-grid">';
  wds.forEach(w => { html += '<div class="cal-wd">' + w + '</div>'; });
  for (let i = 0; i < firstOffset; i++) html += '<div class="cal-day empty"></div>';
  for (let n = 1; n <= daysInMonth; n++) {
    const day = byDay[n];
    const isToday = isThisMonth && today.getDate() === n;
    html += '<div class="cal-day' + (isToday ? ' today' : '') + '">';
    html += '<span class="num">' + n + '</span>';
    if (day) {
      const dot = v => '<span class="cal-dot ' + (v === true ? 'free' : v === false ? '' : 'unknown') + '"></span>';
      html += '<span class="cal-slots">' + dot(day.slots.am) + dot(day.slots.pm) + dot(day.slots.soir) + '</span>';
    }
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="cal-legend">';
  html += '<span><i style="background:var(--avail)"></i>' + t('avail_free') + '</span>';
  html += '<span><i style="background:var(--busy)"></i>' + t('avail_busy') + '</span>';
  html += '</div>';
  html += '<div class="cal-note">' + t('avail_slotnote') + '</div>';
  html += '<div class="cal-note"><a href="' + (d.source || '#') + '" target="_blank" rel="noopener">' + t('avail_source') + '</a></div>';

  card.innerHTML = html;
  const prev = document.getElementById('calPrev');
  const next = document.getElementById('calNext');
  if (prev && d.prevPage) prev.onclick = () => loadCalendar(d.prevPage);
  if (next && d.nextPage) next.onclick = () => loadCalendar(d.nextPage);
}

/* Initialisierung: Sprache aus der URL bestimmen (vom Server gesetzt),
   sonst aus dem Pfad, sonst aus der Browsersprache. */
function initialLang() {
  if (window.__LANG__ && ['de', 'en', 'fr'].includes(window.__LANG__)) return window.__LANG__;
  const fromPath = location.pathname.replace(/\//g, '');
  if (['de', 'en', 'fr'].includes(fromPath)) return fromPath;
  const b = (navigator.language || 'de').slice(0, 2);
  return ['de', 'en', 'fr'].includes(b) ? b : 'de';
}
setLang(initialLang(), false);
// Vor-/Zurück-Knopf des Browsers berücksichtigen
window.addEventListener('popstate', () => setLang(initialLang(), false));
loadReviews();
loadCalendar();
</script>
